{% extends 'base.html' %}

{% block content %}

<div class="vote-container">

    <div class="vote-card">

        <h1>Vote for {{ nominee.full_name }}</h1>

        <p>
            Category: {{ nominee.category.name }}
        </p>

        <form method="POST">
            {% csrf_token %}

            {% for field in form %}

                <div class="form-group">

                    <label>
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.errors %}
                        <small class="error">
                            {{ field.errors }}
                        </small>
                    {% endif %}

                </div>

            {% endfor %}

            <button type="submit" class="btn">
                Submit Vote
            </button>

        </form>

    </div>

</div>

{% endblock %}
